# =============================================================================
# Foundry Studio — docker-compose.yml
#
# WSZYSTKIE KOMENDY:
#
# --- SETUP ---
#   cp .env.example .env                    # skopiuj i uzupelnij klucze API
#   docker compose build                    # zbuduj wszystkie obrazy
#
# --- CORE STACK (API + UI + baza) ---
#   docker compose up -d                    # uruchom
#   docker compose down                     # zatrzymaj
#   docker compose logs -f                  # logi wszystkich serwisow
#   docker compose logs -f foundry-api      # logi tylko API
#   docker compose ps                       # status kontenerow
#
# --- PIPELINE (generowanie Q&A) ---
#   # Tryb 1: wszystkie PDFy z folderu data/ (domyslny)
#   docker compose run --rm app
#
#   # Tryb 2: wybrany podfolder (rozne tematy osobno)
#   docker compose run --rm app \
#     --data-dir /app/data/esg \
#     --batch-id esg-v1
#
#   # Tryb 3: konkretne pliki
#   docker compose run --rm app \
#     --pdf /app/data/csddd.pdf \
#     --pdf /app/data/csrd.pdf \
#     --batch-id esg-v1 \
#     --chunk-limit 50
#
# --- TRENING (wymaga GPU) ---
#   docker compose --profile train run --rm foundry-trainer \
#     python -m training.train_sft \
#       --jsonl   /app/output/dataset_esg_v1.jsonl \
#       --model   meta-llama/Llama-3.2-3B-Instruct \
#       --output-dir /app/output/models
#
#   docker compose --profile train run --rm foundry-trainer \
#     python -m training.train_dpo \
#       --dpo-jsonl  /app/output/dataset_esg_v1_dpo.jsonl \
#       --sft-model  /app/output/models/sft \
#       --output-dir /app/output/models
#
# --- CHATBOT (Open WebUI) ---
#   docker compose --profile chatbot up -d               # uruchom Open WebUI (Ollama już startuje domyślnie)
#   docker compose --profile chatbot down                # zatrzymaj WebUI
#   docker exec foundry_ollama ollama list               # lista pobranych modeli
#   docker exec foundry_ollama ollama pull llama3.3:70b  # dodaj model ręcznie
#
# --- LOCAL GPU (vLLM zamiast OpenAI) ---
#   docker compose --profile gpu up -d vllm
#
# --- PELNE ZATRZYMANIE + CZYSZCZENIE ---
#   docker compose --profile chatbot --profile train --profile gpu down
#   docker compose --profile chatbot --profile train --profile gpu down -v  # kasuje wolumeny!
#
# PORTY:
#   3000  Next.js frontend   http://localhost:3000
#   8080  FastAPI + Swagger  http://localhost:8080/docs
#  11434  Ollama API         http://localhost:11434  (zawsze dostepne)
#   3000  Open WebUI         http://localhost:3000   (--profile chatbot, uwaga: port = frontend)
#   5432  PostgreSQL         (tylko wewnatrz sieci Docker)
#
# =============================================================================


x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

# Wspolne zmienne srodowiskowe dla kontenerow z baza i LLM
x-app-env: &app-env
  DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-esg_user}:${POSTGRES_PASSWORD}@postgres:5432/esg_foundry
  ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-esg_user}:${POSTGRES_PASSWORD}@postgres:5432/esg_foundry
  OPENAI_API_KEY: ${OPENAI_API_KEY:?Ustaw OPENAI_API_KEY w pliku .env}
  OPENAI_PRIMARY_MODEL: ${OPENAI_PRIMARY_MODEL:-gpt-4o-mini}
  OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-4o}
  # Ollama LOCAL — primary generator (qwen2.5:14b, free, zero cost)
  OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:14b}
  OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
  USE_LOCAL_EMBEDDINGS: ${USE_LOCAL_EMBEDDINGS:-true}
  LLAMA_PARSE_API_KEY: ${LLAMA_PARSE_API_KEY:-}
  OUTPUT_FILE: /app/output/dataset_esg_v1.jsonl
  DPO_OUTPUT_FILE: /app/output/dataset_esg_v1_dpo.jsonl
  ORPO_OUTPUT_FILE: /app/output/dataset_esg_v1_orpo.jsonl
  KTO_OUTPUT_FILE: /app/output/dataset_esg_v1_kto.jsonl
  CLIENT_ID: ${CLIENT_ID:-dev_client}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  TENACITY_MAX_ATTEMPTS: ${TENACITY_MAX_ATTEMPTS:-6}
  TENACITY_INITIAL_WAIT: ${TENACITY_INITIAL_WAIT:-2.0}
  TENACITY_MAX_WAIT: ${TENACITY_MAX_WAIT:-64.0}
  REPLICATE_API_KEY: ${REPLICATE_API_KEY:-}
  HF_TOKEN: ${HF_TOKEN:-}
  HF_DATASET_REPO: ${HF_DATASET_REPO:-}
  HF_MODEL_REPO: ${HF_MODEL_REPO:-}
  ADMIN_API_KEY: ${ADMIN_API_KEY:-}
  MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-26214400}
  CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://localhost:8501"]}

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector
  # Uruchomienie: docker compose up -d postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: esg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: esg_foundry
      POSTGRES_USER: ${POSTGRES_USER:-esg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Ustaw POSTGRES_PASSWORD w pliku .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c maintenance_work_mem=256MB
        -c work_mem=64MB
        -c max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esg_user} -d esg_foundry"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Pipeline — generowanie Q&A z dokumentow PDF
  #
  # Domyslnie: przetwarza WSZYSTKIE *.pdf z folderu data/
  #   docker compose run --rm app
  #
  # Wybrany podfolder (rozne tematy osobno — zalecane!):
  #   docker compose run --rm app --data-dir /app/data/esg --batch-id esg-v1
  #   docker compose run --rm app --data-dir /app/data/finanse --batch-id finanse-v1
  #
  # Konkretne pliki:
  #   docker compose run --rm app --pdf /app/data/csrd.pdf --batch-id csrd-only
  # ---------------------------------------------------------------------------
  app:
    profiles: [pipeline]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esg_app
    restart: "no"
    environment:
      <<: *app-env
      ADVERSARIAL_RATIO: ${ADVERSARIAL_RATIO:-0.10}
      QUALITY_THRESHOLD: ${QUALITY_THRESHOLD:-0.90}
      MAX_RETRIES_PER_CHUNK: ${MAX_RETRIES_PER_CHUNK:-3}
      MAX_TURNS: ${MAX_TURNS:-3}
      MAX_REFUSAL_RATIO: ${MAX_REFUSAL_RATIO:-0.10}
      WATERMARK_INTERVAL: ${WATERMARK_INTERVAL:-50}
      DEDUP_THRESHOLD: ${DEDUP_THRESHOLD:-0.85}
      CROSS_DOC_SAMPLES: ${CROSS_DOC_SAMPLES:-50}
      VLLM_MAX_TOKENS: ${VLLM_MAX_TOKENS:-2048}
      CHUNK_DELAY_SECONDS: ${CHUNK_DELAY_SECONDS:-0}
      BATCH_ID: ${BATCH_ID:-batch-001}
      CHUNK_LIMIT: ${CHUNK_LIMIT:-0}
    command:
      - --data-dir
      - /app/data
      - --batch-id
      - ${BATCH_ID:-batch-001}
      - --chunk-limit
      - "${CHUNK_LIMIT:-0}"
    volumes:
      - ./output:/app/output
      - ./data:/app/data:ro
    mem_limit: 4g
    memswap_limit: 4g
    cpus: "4.0"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # FastAPI backend — REST API, WebSocket, pipeline orchestration
  #
  # Uruchomienie: docker compose up -d foundry-api
  # Swagger UI:   http://localhost:8080/docs
  # Health check: http://localhost:8080/health
  # ---------------------------------------------------------------------------
  foundry-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: foundry_api
    restart: unless-stopped
    environment:
      <<: *app-env
      DATA_DIR: /app/data
      POSTGRES_USER: ${POSTGRES_USER:-esg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Translation
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
      TRANSLATE_CHUNKS: ${TRANSLATE_CHUNKS:-false}
      TRANSLATE_SOURCE_LANG: ${TRANSLATE_SOURCE_LANG:-en}
      # Gap Scout — core
      SCOUT_SOURCES_ENABLED: ${SCOUT_SOURCES_ENABLED:-[]}
      SCOUT_MIN_GAP_SCORE: ${SCOUT_MIN_GAP_SCORE:-0.35}
      SCOUT_MODEL_TARGETS: ${SCOUT_MODEL_TARGETS:-["gpt-4o","claude-3.5-sonnet","llama-3","gemini-1.5","mistral"]}
      SCOUT_LANGUAGES: ${SCOUT_LANGUAGES:-["en","de","fr","ja","zh","ko","ar","ru","pt","es"]}
      SCOUT_MAX_CONCURRENT_CRAWLERS: ${SCOUT_MAX_CONCURRENT_CRAWLERS:-20}
      SCOUT_VERIFICATION_MAX_CONCURRENT: ${SCOUT_VERIFICATION_MAX_CONCURRENT:-8}
      # Gap Scout — cutoff dates
      SCOUT_CUTOFF_GPT4O: ${SCOUT_CUTOFF_GPT4O:-2024-04-01}
      SCOUT_CUTOFF_CLAUDE35: ${SCOUT_CUTOFF_CLAUDE35:-2024-04-01}
      SCOUT_CUTOFF_LLAMA3: ${SCOUT_CUTOFF_LLAMA3:-2024-03-01}
      SCOUT_CUTOFF_GEMINI15: ${SCOUT_CUTOFF_GEMINI15:-2024-02-01}
      # Gap Scout — WebSub Tier 1 (optional)
      SCOUT_WEBHOOK_CALLBACK_URL: ${SCOUT_WEBHOOK_CALLBACK_URL:-}
      SCOUT_WEBHOOK_SECRET: ${SCOUT_WEBHOOK_SECRET:-}
      # Gap Scout — external API keys (all optional)
      SCOUT_DEEPL_API_KEY: ${SCOUT_DEEPL_API_KEY:-}
      SCOUT_SERPAPI_KEY: ${SCOUT_SERPAPI_KEY:-}
      SCOUT_WHISPER_MODEL: ${SCOUT_WHISPER_MODEL:-base}
      IEEE_API_KEY: ${IEEE_API_KEY:-}
      CORE_API_KEY: ${CORE_API_KEY:-}
      PRODUCTHUNT_API_KEY: ${PRODUCTHUNT_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      PODCAST_INDEX_API_KEY: ${PODCAST_INDEX_API_KEY:-}
      PODCAST_INDEX_API_SECRET: ${PODCAST_INDEX_API_SECRET:-}
      EUROPEANA_API_KEY: ${EUROPEANA_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
      - ./data:/app/data
      - ./api:/app/api:ro
      - ./agents:/app/agents:ro
      - ./pipeline:/app/pipeline:ro
      - ./training:/app/training:ro
      - ./utils:/app/utils:ro
      - ./config:/app/config:ro
      - ./db:/app/db:ro
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "2.0"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Next.js / React frontend — zastępuje Streamlit UI
  #
  # Uruchomienie: docker compose up -d frontend
  # Dostep:       http://localhost:3000
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: foundry_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://foundry-api:8080
      API_URL: http://foundry-api:8080
    ports:
      - "3000:3000"
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    depends_on:
      foundry-api:
        condition: service_started
    networks:
      - foundry_net
    logging: *default-logging


  # ---------------------------------------------------------------------------
  # Ollama — lokalny serwer LLM (PRIMARY generator Q&A — darmowy)
  #
  # Modele pobierane AUTOMATYCZNIE przy `docker compose up` (idempotentne).
  # Pasek postępu widoczny w logach kontenera (Docker Desktop → ollama → Logs).
  # Healthcheck pozytywny dopiero gdy MODEL jest gotowy, nie tylko serwer.
  # start_period: 30s — serwer startuje, potem do 150 min na pobieranie.
  #
  # Ręczne operacje:
  #   docker logs foundry_ollama -f           # obserwuj pobieranie na żywo
  #   docker exec foundry_ollama ollama list  # lista modeli
  #   docker exec foundry_ollama ollama pull llama3.3:70b
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: foundry_ollama
    restart: unless-stopped
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Serwer Ollama w tle (logi do pliku — nie zalewają terminala)
        ollama serve >> /tmp/ollama-server.log 2>&1 &

        echo '[Foundry] ⏳ Uruchamiam serwer Ollama...'
        until ollama list > /dev/null 2>&1; do sleep 2; done
        echo '[Foundry] ✓ Serwer gotowy.'

        pull_model() {
          MODEL="$$1"
          if ollama list 2>/dev/null | grep -qF "$$MODEL"; then
            echo "[Foundry] ✓ $$MODEL — już pobrany, pomijam"
            return 0
          fi
          echo "[Foundry] ⬇  Pobieram: $$MODEL"
          ollama pull "$$MODEL"
          echo "[Foundry] ✅ $$MODEL — gotowy!"
        }

        pull_model "$$OLLAMA_MODEL"
        pull_model "$$OLLAMA_EMBED_MODEL"

        echo '[Foundry] 🚀 Wszystkie modele gotowe — Foundry startuje!'
        wait
    healthcheck:
      # Zielony dopiero gdy MODEL jest na liście (nie tylko serwer)
      # retries × interval = 300 × 30s = 150 minut — wystarczy na ~1 MB/s
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -qF \"$OLLAMA_MODEL\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 300
      start_period: 30s
    volumes:
      - ./ollama_models:/root/.ollama   # lokalny folder — widoczny w Eksploratorze, odporny na "down -v"
    ports:
      - "11434:11434"
    mem_limit: 10g
    memswap_limit: 10g
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Open WebUI — interfejs czatu (profil chatbot)
  #
  # Dostep: http://localhost:3000
  # ---------------------------------------------------------------------------
  open-webui:
    profiles: [chatbot]
    image: ghcr.io/open-webui/open-webui:main
    container_name: foundry_webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "False"
    ports:
      - "3000:8080"
    depends_on:
      - ollama
    mem_limit: 512m
    memswap_limit: 512m
    volumes:
      - webui_data:/app/backend/data
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Foundry Trainer — GPU container dla treningu SFT + DPO
  #
  # SFT (fine-tuning):
  #   docker compose --profile train run --rm foundry-trainer \
  #     python -m training.train_sft \
  #       --jsonl      /app/output/dataset_esg_v1.jsonl \
  #       --model      meta-llama/Llama-3.2-3B-Instruct \
  #       --output-dir /app/output/models \
  #       --lora-rank  16 \
  #       --epochs     3
  #
  # DPO (alignment):
  #   docker compose --profile train run --rm foundry-trainer \
  #     python -m training.train_dpo \
  #       --dpo-jsonl  /app/output/dataset_esg_v1_dpo.jsonl \
  #       --sft-model  /app/output/models/sft \
  #       --output-dir /app/output/models
  #
  # Datacard (statystyki datasetu):
  #   docker compose --profile train run --rm foundry-trainer \
  #     python -m training.datacard \
  #       --jsonl /app/output/dataset_esg_v1.jsonl \
  #       --dpo   /app/output/dataset_esg_v1_dpo.jsonl
  # ---------------------------------------------------------------------------
  foundry-trainer:
    profiles: [train]
    build:
      context: .
      dockerfile: docker/Dockerfile.trainer
    container_name: foundry_trainer
    restart: "no"
    environment:
      <<: *app-env
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      WANDB_DISABLED: "true"
      TRANSFORMERS_CACHE: /root/.cache/huggingface
    volumes:
      - ./output:/app/output
      - ./data:/app/data:ro
      - hf_cache:/root/.cache/huggingface
    ipc: host
    ulimits:
      memlock: { soft: -1, hard: -1 }
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - foundry_net
    logging: *default-logging

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  hf_cache:
    driver: local
  # ollama_models przeniesiony na bind mount (./ollama_models/) — bezpieczniejszy na Windows
  webui_data:
    driver: local

# =============================================================================
# Network
# =============================================================================
networks:
  foundry_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
