# =============================================================================
# Foundry Studio — docker-compose.yml
#
# WSZYSTKIE KOMENDY:
#
# --- SETUP ---
#   cp .env.example .env                    # skopiuj i uzupelnij klucze API
#   docker compose build                    # zbuduj wszystkie obrazy
#
# --- CORE STACK (API + UI + baza) ---
#   docker compose up -d                    # uruchom
#   docker compose down                     # zatrzymaj
#   docker compose logs -f                  # logi wszystkich serwisow
#   docker compose logs -f foundry-api      # logi tylko API
#   docker compose ps                       # status kontenerow
#
# --- PIPELINE (generowanie Q&A) ---
#   docker compose run --rm app             # uruchom z domyslnymi PDFami z .env
#
#   Lub z wlasnym zestawem plikow:
#   docker compose run --rm app python main.py \
#     --pdf /app/data/plik1.pdf \
#     --pdf /app/data/plik2.pdf \
#     --batch-id batch-001 \
#     --chunk-limit 50
#
# --- TRENING (wymaga GPU) ---
#   docker compose --profile train run --rm foundry-trainer \
#     python -m training.train_sft \
#       --jsonl   /app/output/dataset_esg_v1.jsonl \
#       --model   meta-llama/Llama-3.2-3B-Instruct \
#       --output-dir /app/output/models
#
#   docker compose --profile train run --rm foundry-trainer \
#     python -m training.train_dpo \
#       --dpo-jsonl  /app/output/dataset_esg_v1_dpo.jsonl \
#       --sft-model  /app/output/models/sft \
#       --output-dir /app/output/models
#
# --- CHATBOT ---
#   docker compose --profile chatbot up -d               # uruchom Ollama + WebUI
#   docker compose --profile chatbot down                # zatrzymaj
#   docker exec foundry_ollama ollama pull llama3.2      # pobierz gotowy model
#   docker exec foundry_ollama ollama create NAZWA -f /Modelfile  # zaladuj wlasny model
#
# --- LOCAL GPU (vLLM zamiast OpenAI) ---
#   docker compose --profile gpu up -d vllm
#
# --- PELNE ZATRZYMANIE + CZYSZCZENIE ---
#   docker compose --profile chatbot --profile train --profile gpu down
#   docker compose --profile chatbot --profile train --profile gpu down -v  # kasuje wolumeny!
#
# PORTY:
#   8501  Streamlit UI       http://localhost:8501
#   8080  FastAPI + Swagger  http://localhost:8080/docs
#   3000  Open WebUI         http://localhost:3000   (--profile chatbot)
#  11434  Ollama API         http://localhost:11434  (--profile chatbot)
#   5432  PostgreSQL         (tylko wewnatrz sieci Docker)
#
# =============================================================================

version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

# Wspolne zmienne srodowiskowe dla kontenerow z baza i LLM
x-app-env: &app-env
  DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-esg_user}:${POSTGRES_PASSWORD}@postgres:5432/esg_foundry
  ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-esg_user}:${POSTGRES_PASSWORD}@postgres:5432/esg_foundry
  OPENAI_API_KEY: ${OPENAI_API_KEY:?Ustaw OPENAI_API_KEY w pliku .env}
  OPENAI_PRIMARY_MODEL: ${OPENAI_PRIMARY_MODEL:-gpt-4o-mini}
  OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-4o}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
  GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
  VLLM_BASE_URL: ${VLLM_BASE_URL:-https://api.openai.com/v1}
  VLLM_MODEL: ${OPENAI_PRIMARY_MODEL:-gpt-4o-mini}
  VLLM_API_KEY: ${OPENAI_API_KEY}
  LLAMA_PARSE_API_KEY: ${LLAMA_PARSE_API_KEY:-}
  OUTPUT_FILE: /app/output/dataset_esg_v1.jsonl
  DPO_OUTPUT_FILE: /app/output/dataset_esg_v1_dpo.jsonl
  CLIENT_ID: ${CLIENT_ID:-dev_client}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector
  # Uruchomienie: docker compose up -d postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: esg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: esg_foundry
      POSTGRES_USER: ${POSTGRES_USER:-esg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Ustaw POSTGRES_PASSWORD w pliku .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c maintenance_work_mem=256MB
        -c work_mem=64MB
        -c max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esg_user} -d esg_foundry"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Pipeline — generowanie Q&A z dokumentow PDF
  #
  # Uruchomienie z domyslnymi PDFami (zdefiniowanymi w command ponizej):
  #   docker compose run --rm app
  #
  # Uruchomienie z wlasnym zestawem plikow:
  #   docker compose run --rm app python main.py \
  #     --pdf /app/data/mojdokument.pdf \
  #     --batch-id moj-batch \
  #     --chunk-limit 100
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esg_app
    restart: "no"
    environment:
      <<: *app-env
      ADVERSARIAL_RATIO: ${ADVERSARIAL_RATIO:-0.10}
      QUALITY_THRESHOLD: ${QUALITY_THRESHOLD:-0.90}
      MAX_RETRIES_PER_CHUNK: ${MAX_RETRIES_PER_CHUNK:-3}
      MAX_TURNS: ${MAX_TURNS:-3}
      MAX_REFUSAL_RATIO: ${MAX_REFUSAL_RATIO:-0.10}
      WATERMARK_INTERVAL: ${WATERMARK_INTERVAL:-50}
      BATCH_SIZE: ${BATCH_SIZE:-10}
      DEDUP_THRESHOLD: ${DEDUP_THRESHOLD:-0.85}
      CROSS_DOC_SAMPLES: ${CROSS_DOC_SAMPLES:-50}
      VLLM_MAX_TOKENS: ${VLLM_MAX_TOKENS:-1536}
      BATCH_ID: ${BATCH_ID:-batch-001}
      CHUNK_LIMIT: ${CHUNK_LIMIT:-0}
    command:
      - python
      - main.py
      - --pdf
      - /app/data/csddd.pdf
      - --pdf
      - /app/data/csrd.pdf
      - --pdf
      - /app/data/sfdr.pdf
      - --pdf
      - /app/data/taksonomia.pdf
      - --batch-id
      - ${BATCH_ID:-batch-001}
      - --chunk-limit
      - "${CHUNK_LIMIT:-0}"
    volumes:
      - ./output:/app/output
      - ./data:/app/data:ro
    mem_limit: 4g
    memswap_limit: 4g
    cpus: "4.0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # FastAPI backend — REST API, WebSocket, pipeline orchestration
  #
  # Uruchomienie: docker compose up -d foundry-api
  # Swagger UI:   http://localhost:8080/docs
  # Health check: http://localhost:8080/health
  # ---------------------------------------------------------------------------
  foundry-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: foundry_api
    restart: unless-stopped
    environment:
      <<: *app-env
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      DATA_DIR: /app/data
      POSTGRES_USER: ${POSTGRES_USER:-esg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "2.0"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Streamlit UI — interfejs uzytkownika
  #
  # Uruchomienie: docker compose up -d foundry-ui
  # Dostep:       http://localhost:8501
  # ---------------------------------------------------------------------------
  foundry-ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    container_name: foundry_ui
    restart: unless-stopped
    environment:
      API_URL: http://foundry-api:8080
      OLLAMA_URL: http://ollama:11434
    ports:
      - "8501:8501"
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    depends_on:
      - foundry-api
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # vLLM — lokalny serwer inference (opcjonalny, tylko GPU)
  #
  # Uruchomienie: docker compose --profile gpu up -d vllm
  # Po uruchomieniu zmien w .env:
  #   VLLM_BASE_URL=http://vllm:8000/v1
  #   VLLM_API_KEY=not-needed
  # ---------------------------------------------------------------------------
  vllm:
    profiles: [gpu]
    image: vllm/vllm-openai:latest
    container_name: esg_vllm
    restart: unless-stopped
    command: >
      --model ${VLLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      --dtype half
      --gpu-memory-utilization 0.80
      --max-model-len 8192
      --enforce-eager
      --host 0.0.0.0
      --port 8000
      --served-model-name llama3
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf_cache:/root/.cache/huggingface
    mem_limit: 10g
    memswap_limit: 10g
    shm_size: 2g
    ipc: host
    ulimits:
      memlock: { soft: -1, hard: -1 }
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Ollama — serwer modeli GGUF (profil chatbot)
  #
  # Uruchomienie: docker compose --profile chatbot up -d
  # Zatrzymanie:  docker compose --profile chatbot down
  #
  # Zaladowanie gotowego modelu z internetu:
  #   docker exec foundry_ollama ollama pull llama3.2
  #   docker exec foundry_ollama ollama pull phi4-mini
  #
  # Zaladowanie wlasnego modelu (po eksporcie):
  #   docker cp output/model.gguf foundry_ollama:/models/model.gguf
  #   docker cp output/Modelfile  foundry_ollama:/Modelfile
  #   docker exec foundry_ollama ollama create NAZWA-MODELU -f /Modelfile
  #
  # Lista zaladowanych modeli:
  #   docker exec foundry_ollama ollama list
  # ---------------------------------------------------------------------------
  ollama:
    profiles: [chatbot]
    image: ollama/ollama:latest
    container_name: foundry_ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    mem_limit: 8g
    memswap_limit: 8g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Open WebUI — interfejs czatu (profil chatbot)
  #
  # Dostep: http://localhost:3000
  # ---------------------------------------------------------------------------
  open-webui:
    profiles: [chatbot]
    image: ghcr.io/open-webui/open-webui:main
    container_name: foundry_webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "False"
    ports:
      - "3000:8080"
    depends_on:
      - ollama
    mem_limit: 512m
    memswap_limit: 512m
    volumes:
      - webui_data:/app/backend/data
    networks:
      - foundry_net
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Foundry Trainer — GPU container dla treningu SFT + DPO
  #
  # SFT (fine-tuning):
  #   docker compose --profile train run --rm foundry-trainer \
  #     python -m training.train_sft \
  #       --jsonl      /app/output/dataset_esg_v1.jsonl \
  #       --model      meta-llama/Llama-3.2-3B-Instruct \
  #       --output-dir /app/output/models \
  #       --lora-rank  16 \
  #       --epochs     3
  #
  # DPO (alignment):
  #   docker compose --profile train run --rm foundry-trainer \
  #     python -m training.train_dpo \
  #       --dpo-jsonl  /app/output/dataset_esg_v1_dpo.jsonl \
  #       --sft-model  /app/output/models/sft \
  #       --output-dir /app/output/models
  #
  # Datacard (statystyki datasetu):
  #   docker compose --profile train run --rm foundry-trainer \
  #     python -m training.datacard \
  #       --jsonl /app/output/dataset_esg_v1.jsonl \
  #       --dpo   /app/output/dataset_esg_v1_dpo.jsonl
  # ---------------------------------------------------------------------------
  foundry-trainer:
    profiles: [train]
    build:
      context: .
      dockerfile: docker/Dockerfile.trainer
    container_name: foundry_trainer
    restart: "no"
    environment:
      <<: *app-env
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      WANDB_DISABLED: "true"
      TRANSFORMERS_CACHE: /root/.cache/huggingface
    volumes:
      - ./output:/app/output
      - ./data:/app/data:ro
      - hf_cache:/root/.cache/huggingface
    ipc: host
    ulimits:
      memlock: { soft: -1, hard: -1 }
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - foundry_net
    logging: *default-logging

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  hf_cache:
    driver: local
  ollama_models:
    driver: local
  webui_data:
    driver: local

# =============================================================================
# Network
# =============================================================================
networks:
  foundry_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
