# monitoring/docker-compose.monitoring.yml
# Included automatically by docker-compose.yml via the `include` directive.
# All paths are relative to this file's location (monitoring/).

services:
  # Nadpisania dla głównych serwisów — aktywuje OTLP gdy monitoring jest uruchomiony
  foundry-api:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    depends_on:
      - tempo

  foundry-worker:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    depends_on:
      - tempo

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: foundry-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - foundry_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: foundry-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-foundry-admin}"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/foundry-overview.json
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3001:3000"
    networks:
      - foundry_net
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: foundry-loki
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - foundry_net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: foundry-promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - foundry_net
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.5.0
    container_name: foundry-tempo
    volumes:
      - tempo_data:/tmp/tempo
      - ./tempo.yaml:/etc/tempo.yaml:ro
    command: -config.file=/etc/tempo.yaml
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "3200:3200"  # Tempo query API
    networks:
      - foundry_net
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    container_name: foundry-nats
    command: "--jetstream --store_dir=/data"
    volumes:
      - nats_data:/data
    ports:
      - "4222:4222"
      - "8222:8222"
      - "7777:7777"
    networks:
      - foundry_net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: foundry-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    networks:
      - foundry_net
    restart: unless-stopped

  neo4j:
    image: neo4j:5.21-community
    container_name: foundry-neo4j
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-foundry-neo4j}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1g"
      NEO4J_dbms_memory_pagecache_size: "512m"
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - foundry_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: foundry-litellm
    volumes:
      - ../config/litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OLLAMA_URL: "${OLLAMA_URL:-http://ollama:11434}"
      REDIS_HOST: redis
      # Prisma wymaga formatu postgresql:// (nie postgresql+psycopg2://)
      DATABASE_URL: "postgresql://${POSTGRES_USER:-esg_user}:${POSTGRES_PASSWORD}@postgres:5432/esg_foundry"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-foundry-dev-key}"
    ports:
      - "4000:4000"
    networks:
      - foundry_net
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  nats_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
