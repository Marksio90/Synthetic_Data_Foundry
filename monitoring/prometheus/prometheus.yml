global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: foundry

scrape_configs:
  - job_name: foundry-api
    static_configs:
      - targets: ['foundry-api:8080']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: foundry-worker
    static_configs:
      - targets: ['foundry-worker:8081']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: litellm
    static_configs:
      - targets: ['litellm:4000']
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: nats
    static_configs:
      - targets: ['nats:7777']
    metrics_path: /metrics

  - job_name: qdrant
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: /metrics
