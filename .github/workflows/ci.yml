name: ci

on:
  pull_request:
  push:
    branches: [work, main]

jobs:
  tests-and-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff mypy pip-audit

      - name: Lint (ruff)
        run: |
          ruff check api scripts tests

      - name: Type check (mypy)
        run: |
          mypy --config-file mypy.ini --follow-imports=skip api/errors.py scripts/contract_smoke.py tests/test_training_cancel.py tests/test_pipeline_preflight.py

      - name: Unit tests
        run: |
          pytest

      - name: Contract smoke
        run: |
          python scripts/contract_smoke.py

      - name: Security audit (pip-audit)
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt
